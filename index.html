<!DOCTYPE html>
<html>
<head>
<title>Mini Shop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

header{
text-align:center;
margin-bottom:30px;
}

header h1{
color:#333;
}

.container{
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
max-width:1000px;
margin:auto;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.item-name{
font-size:18px;
margin-bottom:10px;
color:#444;
}

.price{
font-weight:bold;
color:#27ae60;
margin-bottom:15px;
}

button{
background:#2d89ef;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#1b5fbf;
}

.cart{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
height:fit-content;
}

.cart h2{
margin-bottom:15px;
}

.cart ul{
margin-bottom:15px;
padding-left:18px;
}

.total{
font-weight:bold;
margin-bottom:15px;
}

.pay{
width:100%;
background:#27ae60;
}

.pay:hover{
background:#1f8a4d;
}

/* Responsive */

@media(max-width:768px){

.container{
grid-template-columns:1fr;
}

.cart{
order:-1;
}

}

</style>
</head>

<body>

<header>
<h1>Mini Shop</h1>
</header>

<div class="container">

<div class="products">

<div class="card">
<div class="item-name">Item 1</div>
<div class="price">₹500</div>
<button onclick="a('Item 1',500)">Add to Cart</button>
</div>

<div class="card">
<div class="item-name">Item 2</div>
<div class="price">₹800</div>
<button onclick="a('Item 2',800)">Add to Cart</button>
</div>

<div class="card">
<div class="item-name">Item 3</div>
<div class="price">₹400</div>
<button onclick="a('Item 3',400)">Add to Cart</button>
</div>

</div>

<div class="cart">
<h2>Cart</h2>

<ul id="x"></ul>

<div class="total">
Total: ₹ <span id="t">0</span>
</div>

<button class="pay" onclick="p()">Pay Now</button>

</div>

</div>

<script>

var z = 0;

function a(n,p){
var li = document.createElement("li");
li.innerHTML = n + " - ₹" + p;
document.getElementById("x").appendChild(li);

z = z + p;
document.getElementById("t").innerHTML = z;
}

function p(){
alert("Payment Successful");
document.getElementById("x").innerHTML="";
z = 0;
document.getElementById("t").innerHTML = 0;
}

</script>

</body>
</html>
